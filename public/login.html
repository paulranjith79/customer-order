<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer Login</title>

<style>
body{
    font-family: Arial;
    max-width:400px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>Customer Login</h2>

<input
type="text"
id="phone"
placeholder="Mobile Number">

<input
type="date"
id="dob">

<button onclick="login()">
Login
</button>

<script>

async function login(){

    const phone =
    document.getElementById("phone").value.trim();

    const dob =
    document.getElementById("dob").value;

    if(phone === ""){

        alert("Enter Mobile Number");
        return;

    }

    if(dob === ""){

        alert("Select DOB");
        return;

    }

    try{

        const response =
        await fetch('/login',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                phone:phone,
                dob:dob

            })

        });

        const data =
        await response.json();

        if(data.success){

            localStorage.setItem(
                "customer",
                JSON.stringify(data.customer)
            );

            location.href="order.html";

        }
        else{

            alert(
                "Invalid Mobile Number or DOB"
            );

        }

    }
    catch(err){

        console.log(err);

        alert(
            "Server Error"
        );

    }

}

</script>

</body>
</html>
